<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codex Outputs</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top right, rgba(59, 130, 246, 0.18), transparent 30%),
        linear-gradient(180deg, #0f172a, #020617);
    }

    main {
      width: min(760px, calc(100% - 32px));
      padding: 32px;
      border-radius: 20px;
      background: rgba(15, 23, 42, 0.84);
      border: 1px solid rgba(148, 163, 184, 0.18);
    }

    h1 {
      margin: 0 0 10px;
    }

    p {
      margin: 0 0 18px;
      color: rgba(226, 232, 240, 0.74);
    }

    ul {
      margin: 0;
      padding-left: 20px;
      line-height: 1.9;
    }

    a {
      color: #93c5fd;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>Codex Outputs</h1>
    <p>Published static pages for this agent directory.</p>
    <ul>
      <li><a href="../">Back to root</a></li>
      <li><a href="./visual-first/">Visual First</a></li>
      <li><a href="./spec-driven/">Spec Driven</a></li>
      <li><a href="./context-rich/">Context Rich</a></li>
      <li><a href="./goal-oriented/">Goal Oriented</a></li>
    </ul>
  </main>
</body>
</html>
