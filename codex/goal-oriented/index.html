<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Motion Blob Burst</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-1: #081119;
        --bg-2: #132838;
        --ink: #eef6ff;
        --muted: rgba(226, 238, 255, 0.72);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 18% 18%, rgba(80, 198, 255, 0.16), transparent 28%),
          radial-gradient(circle at 82% 20%, rgba(255, 143, 109, 0.18), transparent 24%),
          radial-gradient(circle at 50% 88%, rgba(76, 255, 192, 0.13), transparent 34%),
          linear-gradient(145deg, var(--bg-1), var(--bg-2));
        color: var(--ink);
      }

      body {
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      .scene {
        position: relative;
        width: min(92vw, 980px);
        aspect-ratio: 1.2;
        display: grid;
        place-items: center;
        cursor: pointer;
        user-select: none;
      }

      .scene::before,
      .scene::after {
        content: "";
        position: absolute;
        inset: auto;
        border-radius: 999px;
        filter: blur(42px);
        opacity: 0.36;
        pointer-events: none;
      }

      .scene::before {
        width: 36vmin;
        height: 36vmin;
        background: rgba(61, 187, 255, 0.22);
        transform: translate(-26vmin, -18vmin);
      }

      .scene::after {
        width: 28vmin;
        height: 28vmin;
        background: rgba(255, 156, 89, 0.18);
        transform: translate(24vmin, 16vmin);
      }

      .shell {
        position: relative;
        width: min(78vmin, 760px);
        aspect-ratio: 1;
        display: grid;
        place-items: center;
        transform-style: preserve-3d;
        will-change: transform, opacity;
      }

      svg {
        width: 100%;
        height: 100%;
        overflow: visible;
      }

      .caption {
        position: absolute;
        left: 50%;
        bottom: 4%;
        transform: translateX(-50%);
        display: grid;
        gap: 0.2rem;
        text-align: center;
        pointer-events: none;
      }

      .caption strong {
        font-size: clamp(1rem, 1.4vw, 1.15rem);
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .caption span {
        font-size: clamp(0.82rem, 1.1vw, 0.92rem);
        color: var(--muted);
        letter-spacing: 0.06em;
      }

      .backdrop-ring {
        opacity: 0.42;
      }

      .blob-path {
        transform-box: fill-box;
        transform-origin: center;
      }

      .fragment {
        opacity: 0;
        transform-box: fill-box;
        transform-origin: center;
        filter: drop-shadow(0 0 18px rgba(88, 218, 255, 0.32));
        will-change: transform, opacity;
      }
    </style>
  </head>
  <body>
    <main class="scene" id="scene" aria-label="Interactive morphing blob">
      <div class="shell" id="shell">
        <svg viewBox="0 0 600 600" aria-hidden="true">
          <defs>
            <radialGradient id="blobGradient" gradientUnits="userSpaceOnUse" cx="300" cy="290" r="210">
              <stop id="stopInner" offset="0%" stop-color="#9ef6ff"></stop>
              <stop id="stopMid" offset="52%" stop-color="#61a8ff"></stop>
              <stop id="stopEdge" offset="100%" stop-color="#1d2f8f"></stop>
            </radialGradient>

            <filter id="blobGlow" x="-70%" y="-70%" width="240%" height="240%">
              <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="baseBlur"></feGaussianBlur>
              <feFlood id="glowFlood" flood-color="#59d8ff" flood-opacity="1" result="floodColor"></feFlood>
              <feComposite in="floodColor" in2="baseBlur" operator="in" result="coloredGlow"></feComposite>
              <feGaussianBlur in="coloredGlow" stdDeviation="18" result="softGlow"></feGaussianBlur>
              <feMerge>
                <feMergeNode in="softGlow"></feMergeNode>
                <feMergeNode in="SourceGraphic"></feMergeNode>
              </feMerge>
            </filter>
          </defs>

          <g class="backdrop-ring" id="backdropRing">
            <circle id="halo" cx="300" cy="300" r="145" fill="url(#blobGradient)" filter="url(#blobGlow)" opacity="0.44"></circle>
          </g>

          <g id="blobCore">
            <path id="blobPath" class="blob-path" d="" fill="url(#blobGradient)" filter="url(#blobGlow)"></path>
          </g>

          <g id="fragmentLayer"></g>
        </svg>
      </div>

      <div class="caption">
        <strong>Motion Blob</strong>
        <span>Move to tilt. Click to burst into 12 shards.</span>
      </div>
    </main>

    <script src="../node_modules/motion/dist/motion.dev.js"></script>
    <script>
      const { animate, motionValue, stagger, clamp } = Motion;

      const scene = document.getElementById("scene");
      const shell = document.getElementById("shell");
      const blobCore = document.getElementById("blobCore");
      const backdropRing = document.getElementById("backdropRing");
      const blobPath = document.getElementById("blobPath");
      const halo = document.getElementById("halo");
      const fragmentLayer = document.getElementById("fragmentLayer");
      const stopInner = document.getElementById("stopInner");
      const stopMid = document.getElementById("stopMid");
      const stopEdge = document.getElementById("stopEdge");
      const glowFlood = document.getElementById("glowFlood");
      const gradient = document.getElementById("blobGradient");

      const state = {
        exploded: false,
        resetTimer: null,
        fragmentControls: [],
        leanControls: { x: null, y: null }
      };

      const center = { x: 300, y: 300 };
      const pointCount = 12;
      const baseRadius = 166;

      const morph = motionValue(0);
      const leanX = motionValue(0);
      const leanY = motionValue(0);
      const hue = motionValue(196);
      const glowOrbit = motionValue(0.38);
      const pulse = motionValue(1);

      const shapeSpecs = [
        {
          radii: [1.18, 0.82, 1.08, 0.92, 1.12, 0.84, 1.2, 0.9, 1.06, 0.88, 1.13, 0.94],
          angles: [-0.18, -0.04, 0.06, 0.16, 0.1, 0.02, -0.09, -0.18, -0.08, 0.02, 0.14, 0.06]
        },
        {
          radii: [1.02, 0.9, 1.22, 0.85, 1.14, 0.96, 1.08, 0.82, 1.18, 0.9, 1.05, 1.01],
          angles: [-0.08, 0.08, 0.18, 0.1, -0.04, -0.12, -0.18, -0.06, 0.1, 0.18, 0.08, -0.06]
        },
        {
          radii: [1.1, 0.86, 1.02, 1.03, 1.21, 0.84, 1.04, 0.96, 1.17, 0.82, 1.08, 0.99],
          angles: [0.02, 0.14, 0.08, -0.02, -0.14, -0.18, -0.06, 0.08, 0.15, 0.06, -0.1, -0.16]
        },
        {
          radii: [1.24, 0.84, 1.06, 0.9, 1.16, 0.95, 1.0, 0.84, 1.21, 0.88, 1.04, 1.02],
          angles: [-0.12, 0.02, 0.16, 0.18, 0.06, -0.08, -0.18, -0.14, 0.01, 0.16, 0.12, -0.02]
        }
      ];

      const shapes = shapeSpecs.map(({ radii, angles }) =>
        radii.map((radiusScale, index) => {
          const angle = (Math.PI * 2 * index) / pointCount - Math.PI / 2 + angles[index];
          return {
            x: center.x + Math.cos(angle) * baseRadius * radiusScale,
            y: center.y + Math.sin(angle) * baseRadius * radiusScale
          };
        })
      );

      function polarBlobPath(size, seed, points, wobble) {
        const blobPoints = [];
        for (let index = 0; index < points; index++) {
          const angle = (Math.PI * 2 * index) / points - Math.PI / 2;
          const harmonicA = Math.sin(seed * 0.7 + index * 1.13) * wobble;
          const harmonicB = Math.cos(seed * 0.45 + index * 1.92) * wobble * 0.7;
          const radius = size * (1 + harmonicA + harmonicB);
          blobPoints.push({
            x: Math.cos(angle) * radius,
            y: Math.sin(angle) * radius
          });
        }
        return smoothClosedPath(blobPoints);
      }

      function smoothClosedPath(points) {
        const total = points.length;
        let d = `M ${points[0].x.toFixed(2)} ${points[0].y.toFixed(2)}`;

        for (let index = 0; index < total; index++) {
          const p0 = points[(index - 1 + total) % total];
          const p1 = points[index];
          const p2 = points[(index + 1) % total];
          const p3 = points[(index + 2) % total];

          const cp1x = p1.x + (p2.x - p0.x) / 6;
          const cp1y = p1.y + (p2.y - p0.y) / 6;
          const cp2x = p2.x - (p3.x - p1.x) / 6;
          const cp2y = p2.y - (p3.y - p1.y) / 6;

          d += ` C ${cp1x.toFixed(2)} ${cp1y.toFixed(2)}, ${cp2x.toFixed(2)} ${cp2y.toFixed(2)}, ${p2.x.toFixed(2)} ${p2.y.toFixed(2)}`;
        }

        return `${d} Z`;
      }

      function interpolateShape(progress) {
        const wrapped = ((progress % shapes.length) + shapes.length) % shapes.length;
        const fromIndex = Math.floor(wrapped);
        const toIndex = (fromIndex + 1) % shapes.length;
        const t = wrapped - fromIndex;

        return shapes[fromIndex].map((point, index) => {
          const target = shapes[toIndex][index];
          return {
            x: point.x + (target.x - point.x) * t,
            y: point.y + (target.y - point.y) * t
          };
        });
      }

      function hsl(h, s, l, a = 1) {
        if (a === 1) return `hsl(${h.toFixed(0)} ${s}% ${l}%)`;
        return `hsl(${h.toFixed(0)} ${s}% ${l}% / ${a})`;
      }

      function setFragmentBaseState(fragment) {
        animate(fragment, { x: 0, y: 0, rotate: 0, scale: 0.24, opacity: 0 }, { duration: 0.001 });
      }

      const fragments = Array.from({ length: 12 }, (_, index) => {
        const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
        group.setAttribute("class", "fragment");
        group.setAttribute("transform", `translate(${center.x} ${center.y})`);

        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", polarBlobPath(20 + (index % 4) * 4, index + 1, 7, 0.18));
        path.setAttribute("fill", hsl(190 + index * 7, 95, 66, 0.96));
        group.appendChild(path);
        fragmentLayer.appendChild(group);
        setFragmentBaseState(group);
        return { group, path };
      });

      function springCursor(value, key, target) {
        if (state.leanControls[key]) state.leanControls[key].stop();
        state.leanControls[key] = animate(value, target, {
          type: "spring",
          stiffness: 220,
          damping: 24,
          mass: 0.7
        });
      }

      function updateColors() {
        const currentHue = hue.get();
        const orbit = glowOrbit.get();
        const cx = center.x + leanX.get() * 1.8 + (orbit - 0.5) * 64;
        const cy = center.y + leanY.get() * 1.6 - (orbit - 0.5) * 54;

        stopInner.setAttribute("stop-color", hsl(currentHue + 18, 100, 78));
        stopMid.setAttribute("stop-color", hsl(currentHue - 6, 92, 60));
        stopEdge.setAttribute("stop-color", hsl(currentHue - 58, 78, 34));
        glowFlood.setAttribute("flood-color", hsl(currentHue + 8, 96, 68));

        gradient.setAttribute("cx", cx.toFixed(2));
        gradient.setAttribute("cy", cy.toFixed(2));
        gradient.setAttribute("fx", (cx - 42).toFixed(2));
        gradient.setAttribute("fy", (cy - 36).toFixed(2));

        halo.setAttribute("r", (142 + orbit * 26).toFixed(2));
      }

      function updateShellTransform() {
        const x = leanX.get();
        const y = leanY.get();
        const scale = pulse.get();
        shell.style.transform =
          `translate3d(${x.toFixed(2)}px, ${y.toFixed(2)}px, 0) ` +
          `rotateX(${(-y * 0.22).toFixed(2)}deg) rotateY(${(x * 0.22).toFixed(2)}deg) ` +
          `scale(${scale.toFixed(3)})`;
      }

      function renderBlob() {
        const path = smoothClosedPath(interpolateShape(morph.get()));
        blobPath.setAttribute("d", path);
      }

      function render() {
        renderBlob();
        updateColors();
        updateShellTransform();
        requestAnimationFrame(render);
      }

      function explode() {
        if (state.exploded) return;
        state.exploded = true;

        if (state.resetTimer) clearTimeout(state.resetTimer);
        state.fragmentControls.forEach((control) => control.stop());
        state.fragmentControls = [];

        const currentHue = hue.get();
        animate(blobCore, { scale: [1, 0.82], opacity: [1, 0] }, { duration: 0.32, ease: "easeIn" });
        animate(backdropRing, { scale: [1, 1.16], opacity: [0.42, 0.12] }, { duration: 0.45, ease: "easeOut" });

        const delayFor = stagger(0.045, { startDelay: 0.05, from: "center" });

        fragments.forEach(({ group, path }, index) => {
          setFragmentBaseState(group);
          path.setAttribute("fill", hsl(currentHue + index * 11, 100, 68 - (index % 3) * 4, 0.96));

          const angle = (Math.PI * 2 * index) / fragments.length - Math.PI / 2 + (index % 2 ? 0.14 : -0.14);
          const distance = 108 + (index % 4) * 24 + (index % 3) * 8;
          const dx = Math.cos(angle) * distance;
          const dy = Math.sin(angle) * distance * 0.88;
          const rotation = (index % 2 === 0 ? 1 : -1) * (120 + index * 16);

          const control = animate(
            group,
            {
              x: [0, dx * 0.52, dx],
              y: [0, dy * 0.34 - 14, dy],
              rotate: [0, rotation * 0.45, rotation],
              scale: [0.24, 1.08, 0.55],
              opacity: [0, 1, 0]
            },
            {
              duration: 1.34,
              times: [0, 0.35, 1],
              ease: ["easeOut", "anticipate"],
              delay: delayFor(index, fragments.length)
            }
          );

          state.fragmentControls.push(control);
        });

        state.resetTimer = window.setTimeout(reassemble, 2200);
      }

      function reassemble() {
        state.exploded = false;

        animate(blobCore, { scale: [0.84, 1.06, 1], opacity: [0, 1, 1] }, {
          duration: 0.86,
          times: [0, 0.48, 1],
          ease: ["easeOut", "backOut"]
        });

        animate(backdropRing, { scale: [1.12, 1], opacity: [0.12, 0.42] }, {
          duration: 0.8,
          ease: "easeOut"
        });

        fragments.forEach(({ group }) => setFragmentBaseState(group));
      }

      scene.addEventListener("pointermove", (event) => {
        const bounds = scene.getBoundingClientRect();
        const offsetX = (event.clientX - (bounds.left + bounds.width / 2)) / (bounds.width / 2);
        const offsetY = (event.clientY - (bounds.top + bounds.height / 2)) / (bounds.height / 2);

        springCursor(leanX, "x", clamp(-28, 28, offsetX * 28));
        springCursor(leanY, "y", clamp(-24, 24, offsetY * 24));
      });

      scene.addEventListener("pointerleave", () => {
        springCursor(leanX, "x", 0);
        springCursor(leanY, "y", 0);
      });

      scene.addEventListener("click", () => {
        if (state.exploded) {
          if (state.resetTimer) clearTimeout(state.resetTimer);
          reassemble();
          return;
        }

        explode();
      });

      animate(morph, [0, 1, 2, 3, 4], {
        duration: 14,
        ease: "easeInOut",
        times: [0, 0.25, 0.5, 0.75, 1],
        repeat: Infinity
      });

      animate(hue, [196, 248, 326, 154, 196], {
        duration: 16,
        ease: "linear",
        times: [0, 0.26, 0.53, 0.8, 1],
        repeat: Infinity
      });

      animate(glowOrbit, [0.3, 0.76, 0.42, 0.64, 0.3], {
        duration: 11,
        ease: "easeInOut",
        times: [0, 0.24, 0.55, 0.84, 1],
        repeat: Infinity
      });

      animate(pulse, [0.985, 1.03, 0.992, 1.018, 0.985], {
        duration: 7.2,
        ease: "easeInOut",
        times: [0, 0.23, 0.52, 0.8, 1],
        repeat: Infinity
      });

      render();
    </script>
  </body>
</html>
