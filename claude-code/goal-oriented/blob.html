<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive SVG Blob · Motion.dev</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: radial-gradient(ellipse 90% 70% at 50% 50%, #0e0b2e 0%, #04030f 100%);
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #scene {
      width: 500px;
      height: 500px;
      position: relative;
    }

    #main-svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    /* Let SVG elements transform around their own bounding box center */
    #main-svg * {
      transform-box: fill-box;
      transform-origin: center;
    }

    #main-blob { cursor: pointer; }

    .hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(190, 170, 255, 0.28);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      user-select: none;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="scene">
  <svg id="main-svg" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Main fill: fuchsia → indigo → cyan -->
      <radialGradient id="blob-grad" cx="38%" cy="35%" r="72%" gradientUnits="objectBoundingBox">
        <stop offset="0%"   stop-color="#f0abfc"/>
        <stop offset="42%"  stop-color="#818cf8"/>
        <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.65"/>
      </radialGradient>

      <!-- Outer glow fill (hue shifts separately) -->
      <radialGradient id="glow-grad" cx="50%" cy="50%" r="50%">
        <stop offset="10%"  stop-color="#7c3aed" stop-opacity="1"/>
        <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
      </radialGradient>
    </defs>

    <!-- Outer halo — large, heavily blurred, offset-shifted by hue -->
    <path id="glow-blob" fill="url(#glow-grad)"/>

    <!-- Blob group: receives lean transforms (x / y / skewX) -->
    <g id="blob-group">
      <path id="main-blob" fill="url(#blob-grad)"/>
    </g>
  </svg>
</div>

<div class="hint">Move mouse · Click to explode</div>

<script type="module">
  import { animate, stagger } from 'https://cdn.jsdelivr.net/npm/motion@latest/+esm';

  // ── Shape library ────────────────────────────────────────────────────────────
  // 4 blobs with identical command structure: M C C C C Z
  // (Motion can tween them as CSS `d` property — works in Chrome/Edge/Firefox 72+)
  const SHAPES = [
    // 1 — round
    'M 250 128 C 324 128 372 176 372 250 C 372 324 324 372 250 372 C 176 372 128 324 128 250 C 128 176 176 128 250 128 Z',
    // 2 — leaning top-left
    'M 244 108 C 340 96 400 158 370 255 C 340 352 274 410 188 378 C 108 348 86 276 110 196 C 134 116 160 118 244 108 Z',
    // 3 — pushed right / tall
    'M 268 98 C 358 108 414 164 396 258 C 378 352 315 416 226 408 C 142 400 86 340 94 252 C 102 166 178 88 268 98 Z',
    // 4 — wider left / compressed top
    'M 258 116 C 344 98 402 168 390 260 C 378 350 308 412 220 402 C 136 390 80 318 94 230 C 108 146 174 132 258 116 Z',
  ];

  // Tiny blobs centered at SVG (250, 250) — spawned on explosion
  const MINI_SHAPES = [
    'M 250 235 C 260 235 265 243 265 251 C 265 260 258 266 249 265 C 240 264 234 258 234 249 C 234 241 241 235 250 235 Z',
    'M 252 233 C 264 231 272 241 269 253 C 267 265 256 272 245 270 C 235 267 229 257 232 246 C 234 236 242 234 252 233 Z',
    'M 248 232 C 261 232 270 242 268 255 C 266 268 255 274 243 271 C 232 268 227 257 230 246 C 232 235 238 232 248 232 Z',
  ];

  // ── Element refs ─────────────────────────────────────────────────────────────
  const mainSvg   = document.getElementById('main-svg');
  const blobGroup = document.getElementById('blob-group');
  const mainBlob  = document.getElementById('main-blob');
  const glowBlob  = document.getElementById('glow-blob');
  const scene     = document.getElementById('scene');

  mainBlob.setAttribute('d', SHAPES[0]);
  glowBlob.setAttribute('d', SHAPES[0]);

  // ── 1. MORPH — keyframe loop across all 4 organic shapes ─────────────────────
  animate(mainBlob, { d: [...SHAPES, SHAPES[0]] }, {
    duration: 12,
    repeat: Infinity,
    ease: 'easeInOut',
  });
  animate(glowBlob, { d: [...SHAPES, SHAPES[0]] }, {
    duration: 12,
    repeat: Infinity,
    ease: 'easeInOut',
  });

  // ── 2. HUE SHIFT — radial glow cycles through the full spectrum ───────────────
  // We animate a bare number 0→360 and read it in onUpdate to drive CSS filters.
  animate(0, 360, {
    duration: 7,
    repeat: Infinity,
    ease: 'linear',
    onUpdate(h) {
      const hue = Math.round(h);
      // Inner blob: coloured drop-shadows + hue-rotate on the fill gradient
      mainBlob.style.filter =
        `drop-shadow(0 0 14px hsl(${hue + 270},88%,68%)) ` +
        `drop-shadow(0 0 40px hsl(${hue + 260},72%,48%)) ` +
        `hue-rotate(${hue}deg)`;
      // Outer halo: large blur + offset hue so it breathes at a different rate
      glowBlob.style.filter = `blur(52px) hue-rotate(${(hue + 90) % 360}deg)`;
    },
  });

  // ── 3. MOUSE LEAN — spring physics pulls the blob toward the cursor ───────────
  document.addEventListener('mousemove', (e) => {
    const { left, top, width, height } = scene.getBoundingClientRect();
    const dx = (e.clientX - left - width  / 2) / (width  / 2);  // −1 … +1
    const dy = (e.clientY - top  - height / 2) / (height / 2);  // −1 … +1

    // Main blob group leans + skews
    animate(blobGroup, { x: dx * 32, y: dy * 32, skewX: dx * 7 }, {
      type: 'spring', stiffness: 135, damping: 26, mass: 0.8,
    });
    // Outer halo follows more loosely
    animate(glowBlob, { x: dx * 22, y: dy * 22 }, {
      type: 'spring', stiffness: 72, damping: 22,
    });
  });

  document.addEventListener('mouseleave', () => {
    animate(blobGroup, { x: 0, y: 0, skewX: 0 }, { type: 'spring', stiffness: 100, damping: 30 });
    animate(glowBlob,  { x: 0, y: 0 },            { type: 'spring', stiffness: 75,  damping: 28 });
  });

  // ── 4. CLICK EXPLOSION — 12 mini blobs scatter + fade with stagger ───────────
  let exploding = false;

  mainBlob.addEventListener('click', () => {
    if (exploding) return;
    exploding = true;

    const COUNT = 12;

    // Spawn mini blobs at SVG centre (250, 250)
    const paths = Array.from({ length: COUNT }, (_, i) => {
      const el  = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      const hue = Math.round((i / COUNT) * 360);
      el.setAttribute('d', MINI_SHAPES[i % MINI_SHAPES.length]);
      el.setAttribute('fill', `hsl(${hue},88%,66%)`);
      el.style.filter          = `drop-shadow(0 0 6px hsl(${hue},88%,66%))`;
      el.style.transformBox    = 'fill-box';
      el.style.transformOrigin = 'center';
      mainSvg.appendChild(el);
      return el;
    });

    // Scatter with stagger — each blob flies out at a different angle
    let done = 0;
    paths.forEach((el, i) => {
      const angle = (i / COUNT) * Math.PI * 2 + (Math.random() - 0.5) * 0.45;
      const dist  = 118 + Math.random() * 95;

      animate(el, {
        x:       [0, Math.cos(angle) * dist],
        y:       [0, Math.sin(angle) * dist],
        opacity: [1, 0],
        scale:   [0.55 + Math.random() * 0.55, 0.02],
        rotate:  [0, (Math.random() - 0.5) * 640],
      }, {
        duration: 0.8 + Math.random() * 0.45,
        delay:    stagger(0.045)(i, COUNT),
        ease:     'easeOut',
      }).then(() => {
        el.remove();
        if (++done === COUNT) exploding = false;
      });
    });

    // Spring-punch the main blob on click
    animate(mainBlob, { scale: [1, 1.18, 0.91, 1] }, {
      duration: 0.5,
      ease: [0.34, 1.56, 0.64, 1],
    });
  });
</script>
</body>
</html>
